<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoardRoom AI</title>
    <meta name="description" content="Multi-persona AI decision intelligence that remembers your context, challenges your thinking, and keeps you aligned." />
    <meta name="theme-color" content="#c78e3a" />
    <link rel="icon" type="image/svg+xml" href="/logo/icon.svg" />
    <link rel="apple-touch-icon" href="/logo/wordmark-light.png" />
    <!-- Open Graph -->
    <meta property="og:title" content="BoardRoom AI" />
    <meta property="og:description" content="Your AI-powered executive team." />
    <meta property="og:image" content="/logo/wordmark-dark.png" />
    <meta property="og:type" content="website" />
    <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
