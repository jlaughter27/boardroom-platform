<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoardRoom AI</title>
    <meta name="description" content="Multi-persona AI decision intelligence that remembers your context, challenges your thinking, and keeps you aligned." />
    <!-- Theme color — matches design token --color-primary (warm gold).
         Adapts per color-scheme so browser chrome stays on-brand. -->
    <meta name="theme-color" content="#b5890a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#d4a31a" media="(prefers-color-scheme: dark)" />
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/logo/icon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png" />
    <!-- Progressive Web App -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="BoardRoom" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="BoardRoom AI" />
    <meta property="og:description" content="Your AI-powered executive team." />
    <meta property="og:image" content="/logo/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BoardRoom AI" />
    <meta name="twitter:description" content="Your AI-powered executive team." />
    <meta name="twitter:image" content="/logo/og-image.png" />
    <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
